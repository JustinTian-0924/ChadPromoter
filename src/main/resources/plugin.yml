name: ChadPromoter
version: 0.0.8
main: basementhost.randomchad.ChadPromoterPlugin
api-version: '26.1.2'
description: Promoter plugin
author: Random_Chad
softdepend:
  - Vault

commands:
  chadpromoter:
    description: Open ChadPromoter panel
    aliases:
      - promoter
      - cpromoter
    usage: /chadpromoter

permissions:
  chadpromoter.reload:
    description: Allows reloading ChadPromoter config and language files
    default: op

  chadpromoter.admin:
    description: Allows using ChadPromoter admin commands
    default: op